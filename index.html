<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>人物绕行验证</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* ── 加载进度条 ── */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            transition: opacity 0.6s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .bar {
            width: 260px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            overflow: hidden;
        }
        #loading .fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00aaff, #00ff88);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        #loading .label {
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }
        #loading .label em {
            font-style: normal;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="bar"><div class="fill" id="progress-fill"></div></div>
        <div class="label">加载模型 <em id="progress-text">0%</em></div>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

    <script type="module" src="./main.js"></script>
</body>

</html>
