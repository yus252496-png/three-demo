server {
    listen 80;

    # 如果部署在子路径下修改这里，如 /bigscreen/
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA 路由 fallback：所有路径都返回 index.html
        try_files $uri $uri/ /index.html;
    }

    # 模型文件缓存（7 天）
    location /models/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 静态资源缓存（1 年）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
